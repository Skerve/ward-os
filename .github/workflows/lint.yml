---
name: Lint

"on":
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: read

jobs:
  golangci:
    name: golangci-lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false  # golangci-lint manages its own cache

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          config_data: |
            ---
            extends: default
            rules:
              line-length:
                max: 200
              document-start:
                present: true
              truthy:
                # 'on'/'off' are valid keys in GitHub Actions workflows
                allowed-values: ['true', 'false', 'on', 'off']
                check-keys: false
              comments:
                min-spaces-from-content: 1
